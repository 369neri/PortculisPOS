name: cashier_app
description: Portculis mobile cash register app
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.5.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  csv: ^6.0.0
  cupertino_icons: ^1.0.2
  drift: ^2.22.0
  equatable: ^2.0.5
  file_picker: ^8.1.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  get_it: ^7.6.0
  gtin_toolkit: ^1.0.4
  mobile_scanner: ^6.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.1.4
  sqlite3_flutter_libs: ^0.5.0

dev_dependencies:
  bloc_test: ^9.1.5
  build_runner: ^2.4.0
  change_app_package_name: ^1.1.0
  drift_dev: ^2.22.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0
  test: ^1.22.0
  very_good_analysis: ^7.0.0

