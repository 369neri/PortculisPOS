services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portculis
      POSTGRES_USER: portculis
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: portculis
      DATABASE_USER: portculis
      DATABASE_PASSWORD: changeme
      JWT_SECRET: change-this-to-a-long-random-string
      PORT: "8080"

volumes:
  pgdata:
