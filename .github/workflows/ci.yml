name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cashier-app:
    name: Cashier App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cashier_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --no-fatal-infos

      - name: Run tests
        run: dart test
